# ─── RDAT Copilot — GitHub Pages Deployment Pipeline ─────────────────
#
# Triggers on every push to main. Builds the Next.js static export and
# deploys to GitHub Pages via actions/deploy-pages@v4.
#
# Requirements:
#   1. Go to repo Settings → Pages → Source: "GitHub Actions"
#   2. Ensure the repo is public (or configure GitHub Pages for private repos)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── Build Job ────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export (with basePath for GitHub Pages)
        run: npm run build:ci
        env:
          BASE_PATH: /${{ github.event.repository.name }}
          NODE_ENV: production

      - name: Create .nojekyll (prevent GitHub Pages Jekyll processing)
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
