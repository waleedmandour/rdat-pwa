# ─── RDAT Copilot — Continuous Integration ─────────────────────────
#
# Runs lint + build checks on every push and PR to main.
# Vercel handles deployment automatically — this workflow ensures
# TypeScript errors and lint issues are caught before Vercel builds.
#
# For GitHub Pages deployment, use the separate deploy.yml workflow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci 2>&1 | grep -v "npm warn deprecated"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
