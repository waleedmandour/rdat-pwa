<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <!-- R letter gradient - emerald glow -->
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <!-- Outer glow -->
    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#10b981" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner shadow for depth -->
    <filter id="innerDepth">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feFlood flood-color="#000" flood-opacity="0.3"/>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Rounded square background with subtle border -->
  <rect x="20" y="20" width="472" height="472" rx="96" ry="96" fill="url(#bgGrad)" stroke="#334155" stroke-width="3"/>
  <!-- Inner highlight edge -->
  <rect x="24" y="24" width="464" height="464" rx="92" ry="92" fill="none" stroke="#475569" stroke-width="1" opacity="0.5"/>

  <!-- Glowing R lettermark -->
  <g filter="url(#outerGlow)">
    <path d="M196,156 L276,156 C316,156 336,176 336,206 C336,236 316,256 276,256 L236,256 L296,356 L246,356 L196,256 L196,156 Z M236,186 L236,226 L276,226 C291,226 296,218 296,206 C296,194 291,186 276,186 Z" fill="url(#rGrad)"/>
  </g>

  <!-- R highlight overlay for depth -->
  <path d="M200,160 L270,160 C305,160 320,178 320,206 C320,232 305,250 270,250 L238,250 L290,348 L250,348 L200,250 L200,160 Z M238,190 L238,222 L272,222 C285,222 290,216 290,206 C290,196 285,190 272,190 Z" fill="white" opacity="0.08"/>

  <!-- Subtle accent dots -->
  <circle cx="418" cy="94" r="5" fill="#10b981" opacity="0.7"/>
  <circle cx="94" cy="418" r="3.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="94" cy="94" r="2" fill="#f59e0b" opacity="0.3"/>
</svg>
