<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep dark charcoal gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <!-- R + cursor: vibrant teal gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <!-- AI spark: soft amber glow -->
    <radialGradient id="amberGlow" cx="65%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <!-- Subtle inner glow filter -->
    <filter id="spark" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#14b8a6" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle (rounded rectangle approximating Apple's squircle) -->
  <rect x="48" y="48" width="928" height="928" rx="192" ry="192" fill="url(#bgGrad)"/>

  <!-- Amber glow accent (top-right AI spark area) -->
  <circle cx="700" cy="320" r="280" fill="url(#amberGlow)"/>

  <!-- Main R shape: bold, modern, combining text cursor + AI spark -->
  <g filter="url(#spark)">
    <!-- R body -->
    <path d="M340,280 L520,280 C600,280 640,320 640,400 C640,480 600,520 520,520 L440,520 L560,740 L480,740 L340,520 L340,280 Z M440,340 L440,460 L520,460 C560,460 580,440 580,400 C580,360 560,340 520,340 Z" fill="url(#tealGrad)"/>

    <!-- Text cursor element integrated into R stem (vertical line with blinking cap) -->
    <rect x="330" y="270" width="8" height="480" rx="4" fill="#14b8a6" opacity="0.9"/>

    <!-- AI spark dots (three connected nodes top-right of R loop) -->
    <circle cx="620" cy="310" r="10" fill="#f59e0b" opacity="0.9"/>
    <circle cx="660" cy="280" r="7" fill="#f59e0b" opacity="0.7"/>
    <circle cx="590" cy="270" r="5" fill="#f59e0b" opacity="0.5"/>
    <!-- Connection lines between spark nodes -->
    <line x1="620" y1="310" x2="660" y2="280" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    <line x1="620" y1="310" x2="590" y2="270" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Subtle highlight on R for depth -->
  <path d="M350,290 L510,290 C580,290 620,325 620,400 C620,470 580,505 510,505 L445,505 L550,720 L485,720 L350,505 L350,290 Z M445,350 L445,450 L515,450 C548,450 565,435 565,400 C565,365 548,350 515,350 Z" fill="white" opacity="0.06"/>
</svg>
